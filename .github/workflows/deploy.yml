name: Deploy React App to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: './frontend/package.json'  # ¡IMPORTANTE!

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend  # ¡IMPORTANTE!

      - name: Build React App
        run: npm run build
        working-directory: ./frontend  # ¡IMPORTANTE!
        env:
          CI: false
          VITE_BASE_PATH: '/la-perrada-pos/'  # ¡IMPORTANTE!

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend/dist  # ¡IMPORTANTE!

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4